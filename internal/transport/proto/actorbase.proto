syntax = "proto3";

package actorbase.v1;

option go_package = "github.com/oomymy/actorbase/internal/transport/proto;actorbasepb";

// ─────────────────────────────────────────────────────────
// Data Plane: SDK → PS
// ─────────────────────────────────────────────────────────

service PartitionService {
  // Send는 partitionID의 Actor에게 요청을 전달하고 응답을 반환한다.
  // payload는 Codec으로 직렬화된 사용자 정의 Req 타입이다.
  // 에러는 gRPC status code로 전달한다.
  rpc Send(SendRequest) returns (SendResponse);
}

message SendRequest {
  string partition_id = 1;
  bytes  payload      = 2; // Codec.Marshal(req)
  string actor_type   = 3; // actor type 식별자. PS가 올바른 ActorHost로 라우팅하는 데 사용.
}

message SendResponse {
  bytes payload = 1; // Codec.Marshal(resp)
}

// ─────────────────────────────────────────────────────────
// Management Plane: SDK/abctl → PM
// ─────────────────────────────────────────────────────────

service PartitionManagerService {
  // WatchRouting은 연결 즉시 현재 라우팅 테이블을 전송하고,
  // 이후 변경이 생길 때마다 스트리밍으로 push한다.
  rpc WatchRouting(WatchRoutingRequest) returns (stream RoutingTableProto);

  // RequestSplit은 파티션 split을 PM에 요청한다.
  // actor_type을 명시해야 하며, partitionID의 actor_type과 일치하지 않으면 에러.
  rpc RequestSplit(SplitRequest) returns (SplitResponse);

  // RequestMigrate는 파티션 migration을 PM에 요청한다.
  // actor_type을 명시해야 하며, partitionID의 actor_type과 일치하지 않으면 에러.
  rpc RequestMigrate(MigrateRequest) returns (MigrateResponse);

  // ListMembers는 현재 등록된 PS 노드 목록을 반환한다.
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);

  // GetClusterStats는 클러스터 전체(또는 특정 노드)의 통계를 반환한다.
  // node_id가 빈 문자열이면 모든 노드의 통계를 반환한다.
  rpc GetClusterStats(GetClusterStatsRequest) returns (GetClusterStatsResponse);

  // ApplyPolicy는 YAML 정책을 PM에 적용하고 etcd에 영속화한다. AutoPolicy 활성화.
  rpc ApplyPolicy(ApplyPolicyRequest) returns (ApplyPolicyResponse);

  // GetPolicy는 현재 적용 중인 정책 YAML을 반환한다.
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);

  // ClearPolicy는 정책을 제거하여 ManualPolicy로 전환한다.
  rpc ClearPolicy(ClearPolicyRequest) returns (ClearPolicyResponse);
}

message WatchRoutingRequest {
  string client_id = 1;
}

message SplitRequest {
  string partition_id = 1;
  string split_key    = 2;
  string actor_type   = 3; // 사용자가 명시. PM이 파티션의 실제 actor_type과 검증한다.
}

message SplitResponse {
  string new_partition_id = 1;
}

message MigrateRequest {
  string partition_id   = 1;
  string target_node_id = 2;
  string actor_type     = 3; // 사용자가 명시. PM이 파티션의 실제 actor_type과 검증한다.
}

message MigrateResponse {}

message ListMembersRequest {}

message MemberInfo {
  string     node_id = 1;
  string     address = 2;
  NodeStatus status  = 3;
}

message ListMembersResponse {
  repeated MemberInfo members = 1;
}

// ─────────────────────────────────────────────────────────
// Control Plane: PM → PS
// ─────────────────────────────────────────────────────────

service PartitionControlService {
  // GetStats는 PM이 PS에게 노드 전체 통계를 요청한다.
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);

  // ExecuteSplit은 PM이 PS에게 파티션 split을 명령한다.
  rpc ExecuteSplit(ExecuteSplitRequest) returns (ExecuteSplitResponse);

  // ExecuteMigrateOut은 PM이 PS에게 파티션을 대상 노드로 이동시키도록 명령한다.
  rpc ExecuteMigrateOut(ExecuteMigrateOutRequest) returns (ExecuteMigrateOutResponse);

  // PreparePartition은 PM이 target PS에게 파티션을 CheckpointStore에서 로드하도록 명령한다.
  rpc PreparePartition(PreparePartitionRequest) returns (PreparePartitionResponse);
}

message ExecuteSplitRequest {
  string partition_id     = 1;
  string split_key        = 2;
  string new_partition_id = 3;
  string actor_type       = 4; // PS가 올바른 ActorHost로 라우팅하는 데 사용.
}

message ExecuteSplitResponse {}

message ExecuteMigrateOutRequest {
  string partition_id    = 1;
  string target_node_id  = 2;
  string target_address  = 3;
  string actor_type      = 4; // PS가 올바른 ActorHost로 라우팅하는 데 사용.
}

message ExecuteMigrateOutResponse {}

message PreparePartitionRequest {
  string partition_id    = 1;
  string key_range_start = 2; // target PS가 올바른 파티션인지 검증용
  string key_range_end   = 3;
  string actor_type      = 4; // PS가 올바른 ActorHost로 라우팅하는 데 사용.
}

message PreparePartitionResponse {}

// ─────────────────────────────────────────────────────────
// Shared Messages
// ─────────────────────────────────────────────────────────

message RoutingTableProto {
  int64                    version = 1;
  repeated RouteEntryProto entries = 2;
}

message RouteEntryProto {
  string     partition_id    = 1;
  string     key_range_start = 2;
  string     key_range_end   = 3; // "" = 상한 없음
  string     node_id         = 4;
  string     node_address    = 5;
  NodeStatus node_status     = 6;
  string     actor_type      = 7; // actor type 식별자
}

enum NodeStatus {
  NODE_STATUS_ACTIVE   = 0;
  NODE_STATUS_DRAINING = 1;
}

// ─────────────────────────────────────────────────────────
// Policy Messages
// ─────────────────────────────────────────────────────────

message ApplyPolicyRequest {
  string policy_yaml = 1; // YAML 형식의 정책 문자열
}

message ApplyPolicyResponse {}

message GetPolicyRequest {}

message GetPolicyResponse {
  string policy_yaml = 1; // 현재 적용 중인 정책 YAML. 없으면 빈 문자열.
  bool   active      = 2; // true이면 AutoPolicy 활성 중
}

message ClearPolicyRequest {}

message ClearPolicyResponse {}

// ─────────────────────────────────────────────────────────
// Stats Messages
// ─────────────────────────────────────────────────────────

message PartitionStatsProto {
  string partition_id = 1;
  string actor_type   = 2;
  int64  key_count    = 3; // -1이면 actor가 Countable을 구현하지 않음
  double rps          = 4; // 최근 60초 슬라이딩 윈도우 평균
}

message GetStatsRequest {}

message GetStatsResponse {
  repeated PartitionStatsProto partitions    = 1;
  double                       node_rps      = 2;
  int32                        partition_count = 3;
}

message NodeStatsProto {
  string                       node_id         = 1;
  string                       node_addr       = 2;
  double                       node_rps        = 3;
  int32                        partition_count = 4;
  repeated PartitionStatsProto partitions      = 5;
}

message GetClusterStatsRequest {
  string node_id = 1; // "" = 모든 노드
}

message GetClusterStatsResponse {
  repeated NodeStatsProto nodes = 1;
}
